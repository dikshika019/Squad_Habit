{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Welcome to Squad Habits</h1>
            <p class="text-gray-600 mt-2">Track your habits with your squad</p>
        </div>
        
        <a href="/api/auth/google" 
           class="block w-full bg-white border border-gray-300 text-gray-700 py-3 px-4 rounded-lg hover:bg-gray-50 transition text-center">
            <i class="fab fa-google mr-2 text-red-500"></i>
            Sign in with Google
        </a>
    </div>
</div>
{% endblock %}
