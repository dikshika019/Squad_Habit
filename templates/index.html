<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Habits</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        h1{
            margin-bottom:15px;
            color:#333;
        }

        p{
            color:#666;
            margin-bottom:30px;
        }

        a{
            display:inline-block;
            text-decoration:none;
            background:#4285F4;
            color:white;
            padding:12px 25px;
            border-radius:6px;
            font-size:16px;
        }

        a:hover{
            background:#3367d6;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Squad Habits</h1>

        <p>Track your habits with your squad.</p>

        <a href="/api/auth/google">
            Login with Google
        </a>

    </div>

</body>
</html>
